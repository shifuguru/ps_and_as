# Re-publish the last gh-pages build when a [skip ci] version-bump commit
# overwrote the live site (main has no index.html).
name: Recover GitHub Pages after version bump

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  recover:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.head_commit.message, '[skip ci]') &&
       contains(github.event.head_commit.message, 'chore: bump version'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages build
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Verify gh-pages has app shell
        run: |
          test -f index.html
          grep -q 'id="root"' index.html
          echo "gh-pages artifact looks valid."

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Sync gh-pages build onto main (branch Pages fallback)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/pages-sync/_expo /tmp/pages-sync/assets
          cp index.html version.json 404.html readme-fallback.html web-shell.css \
            favicon.ico manifest.webmanifest metadata.json .nojekyll /tmp/pages-sync/
          cp -R _expo/. /tmp/pages-sync/_expo/
          cp -R assets/. /tmp/pages-sync/assets/
          git fetch origin main
          git checkout origin/main
          cp /tmp/pages-sync/index.html /tmp/pages-sync/version.json /tmp/pages-sync/404.html \
            /tmp/pages-sync/readme-fallback.html /tmp/pages-sync/web-shell.css \
            /tmp/pages-sync/favicon.ico /tmp/pages-sync/manifest.webmanifest \
            /tmp/pages-sync/metadata.json /tmp/pages-sync/.nojekyll .
          rm -rf _expo
          cp -R /tmp/pages-sync/_expo _expo
          cp -R /tmp/pages-sync/assets/. assets/
          git add index.html version.json 404.html readme-fallback.html web-shell.css \
            favicon.ico manifest.webmanifest metadata.json .nojekyll _expo assets
          if git diff --staged --quiet; then
            echo "Main already has current web build."
            exit 0
          fi
          git commit -m "chore: recover web build on main [skip ci]"
          git push origin HEAD:main

  deploy:
    needs: recover
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live site
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Checking $URL"
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -fsSL "$URL" || true)
            if echo "$BODY" | grep -q 'id="root"'; then
              echo "OK: live site recovered at $URL"
              exit 0
            fi
            echo "Attempt $i: waiting…"
            sleep 10
          done
          echo "::error::Recovery failed — check Settings → Pages → Source → GitHub Actions"
          exit 1
