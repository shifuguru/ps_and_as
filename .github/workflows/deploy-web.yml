name: Deploy web app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify server URL for web build
        run: |
          if [ -z "$EXPO_PUBLIC_SERVER_URL" ]; then
            echo "::error::Add repository variable EXPO_PUBLIC_SERVER_URL (your Railway https URL) under Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          echo "Web build will use server: $EXPO_PUBLIC_SERVER_URL"
        env:
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}

      - name: Read app version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Expo web app
        run: npm run build:web
        env:
          GITHUB_PAGES_BASE: /ps_and_as
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}
          EXPO_PUBLIC_BUILD_ID: ${{ github.sha }}
          EXPO_PUBLIC_APP_VERSION: ${{ steps.pkg.outputs.version }}
          EXPO_PUBLIC_BASE_PATH: /ps_and_as

      - name: Verify build output
        run: |
          test -f web-build/index.html
          test -f web-build/404.html
          test -f web-build/readme-fallback.html
          test -f web-build/README.md
          test -f web-build/version.json
          test -f web-build/web-shell.css
          grep -q 'id="root"' web-build/index.html
          grep -q 'viewport-fit=cover' web-build/index.html
          grep -q 'web-shell.css' web-build/index.html
          grep -qE '(--app-shell-h:|--app-height:|100(l|d)vh)' web-build/web-shell.css
          ! grep -q 'height: 100vh' web-build/web-shell.css
          echo "Build artifact looks valid."

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-build
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web app ${{ github.sha }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live site serves the app (not README)
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Checking $URL"
          BODY=$(curl -fsSL "$URL" || true)
          if echo "$BODY" | grep -q 'id="root"'; then
            echo "OK: deployed app shell found at $URL"
          elif echo "$BODY" | grep -qi 'Presidents & Assholes'; then
            echo "::error::GitHub Pages is serving README.md instead of the app."
            echo "Fix (pick one):"
            echo "  • Settings → Pages → Source → GitHub Actions"
            echo "  • Settings → Pages → Source → Deploy from branch → gh-pages → / (root)"
            echo "Do NOT use main branch — that serves this README."
            exit 1
          else
            echo "::warning::Could not confirm app shell; check $URL manually"
          fi
