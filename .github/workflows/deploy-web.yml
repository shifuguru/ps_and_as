name: Deploy web app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify server URL for web build
        run: |
          if [ -z "$EXPO_PUBLIC_SERVER_URL" ]; then
            echo "::error::Add repository variable EXPO_PUBLIC_SERVER_URL (your Railway https URL) under Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          echo "Web build will use server: $EXPO_PUBLIC_SERVER_URL"
        env:
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}

      - name: Build Expo web app
        run: npm run build:web
        env:
          GITHUB_PAGES_BASE: /ps_and_as
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
