name: Deploy web app to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify server URL for web build
        run: |
          if [ -z "$EXPO_PUBLIC_SERVER_URL" ]; then
            echo "::error::Add repository variable EXPO_PUBLIC_SERVER_URL (your Railway https URL) under Settings → Secrets and variables → Actions → Variables"
            exit 1
          fi
          echo "Web build will use server: $EXPO_PUBLIC_SERVER_URL"
        env:
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}

      - name: Read app version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Expo web app
        run: npm run build:web
        env:
          GITHUB_PAGES_BASE: /ps_and_as
          EXPO_PUBLIC_SERVER_URL: ${{ vars.EXPO_PUBLIC_SERVER_URL }}
          EXPO_PUBLIC_BUILD_ID: ${{ github.sha }}
          EXPO_PUBLIC_APP_VERSION: ${{ steps.pkg.outputs.version }}
          EXPO_PUBLIC_BASE_PATH: /ps_and_as

      - name: Verify build output
        run: |
          test -f web-build/index.html
          test -f web-build/404.html
          test -f web-build/readme-fallback.html
          test -f web-build/README.md
          test -f web-build/version.json
          test -f web-build/web-shell.css
          test -f web-build/.nojekyll
          grep -q 'id="root"' web-build/index.html
          grep -q 'viewport-fit=cover' web-build/index.html
          grep -q 'web-shell.css' web-build/index.html
          grep -qE '(--app-shell-h:|--app-height:|100(l|d)vh)' web-build/web-shell.css
          ! grep -q 'height: 100vh' web-build/web-shell.css
          echo "Build artifact looks valid."

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web-build
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy web app ${{ github.sha }}"

      - name: Verify live site serves the app (not README)
        run: |
          URL="https://shifuguru.github.io/ps_and_as/"
          echo "Checking $URL (allow ~60s for Pages CDN after gh-pages push)"
          for i in 1 2 3 4 5 6; do
            BODY=$(curl -fsSL "$URL" || true)
            if echo "$BODY" | grep -q 'id="root"'; then
              echo "OK: deployed app shell found at $URL"
              exit 0
            fi
            echo "Attempt $i: app shell not found yet, waiting…"
            sleep 10
          done
          if echo "$BODY" | grep -qi 'Presidents & Assholes'; then
            echo "::error::GitHub Pages is serving README.md instead of the app."
            exit 1
          fi
          echo "::error::GitHub Pages returned 404 or wrong content at $URL"
          echo "Fix: Settings → Pages → Build and deployment → Source → Deploy from a branch"
          echo "     Branch: gh-pages  Folder: / (root)"
          echo "Do NOT use main branch or GitHub Actions as the Pages source — bump commits on main would break the live site."
          exit 1

  # After a successful deploy, bump patch version on main for the next release.
  # [skip ci] on the bump commit avoids a deploy loop. gh-pages deploy is unaffected.
  bump-version:
    needs: deploy
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: bump version')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Bump version for next release
        run: npm run bump-version

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json app.json package-lock.json src/config/buildCodenames.ts
          if git diff --staged --quiet; then
            echo "Version files unchanged; skipping commit."
            exit 0
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          git commit -m "chore: bump version to v${NEW_VERSION} [skip ci]"
          git push origin HEAD:main
