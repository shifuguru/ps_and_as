<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="theme-color" content="#0f5132" />
    <title>P's &amp; A's</title>
    <style>
      :root {
        color-scheme: dark;
        --felt: #0f5132;
        --felt-deep: #0a3d26;
        --gold: #d4af37;
        --text: #f5f0e6;
        --muted: rgba(245, 240, 230, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background:
          radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08), transparent 42%),
          linear-gradient(180deg, var(--felt-deep), var(--felt));
        color: var(--text);
      }

      .bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 14px 16px;
        background: rgba(0, 0, 0, 0.42);
        border-bottom: 1px solid rgba(212, 175, 55, 0.28);
        backdrop-filter: blur(10px);
      }

      .refresh {
        appearance: none;
        border: 1px solid rgba(212, 175, 55, 0.55);
        background: rgba(212, 175, 55, 0.14);
        color: var(--gold);
        font: inherit;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.3px;
        padding: 10px 22px;
        border-radius: 999px;
        cursor: pointer;
      }

      .refresh:active {
        transform: scale(0.98);
      }

      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 28px 20px 48px;
        line-height: 1.55;
      }

      .status {
        color: var(--muted);
        font-style: italic;
        margin-bottom: 16px;
      }

      .readme {
        color: var(--muted);
      }

      .readme h1,
      .readme h2,
      .readme h3,
      .readme h4 {
        color: var(--gold);
        line-height: 1.25;
        margin-top: 1.4em;
        margin-bottom: 0.5em;
      }

      .readme h1 {
        font-size: clamp(1.6rem, 4vw, 2rem);
        margin-top: 0;
      }

      .readme h2 {
        font-size: 1.25rem;
      }

      .readme h3 {
        font-size: 1.05rem;
      }

      .readme p,
      .readme li {
        color: var(--muted);
      }

      .readme a {
        color: var(--gold);
      }

      .readme blockquote {
        margin: 1em 0;
        padding: 0.5em 1em;
        border-left: 3px solid rgba(212, 175, 55, 0.45);
        background: rgba(0, 0, 0, 0.18);
        color: var(--muted);
      }

      .readme hr {
        border: none;
        border-top: 1px solid rgba(212, 175, 55, 0.22);
        margin: 1.5em 0;
      }

      .readme code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.9em;
        background: rgba(0, 0, 0, 0.28);
        padding: 0.12em 0.35em;
        border-radius: 4px;
      }

      .readme pre {
        overflow-x: auto;
        background: rgba(0, 0, 0, 0.32);
        border: 1px solid rgba(212, 175, 55, 0.18);
        border-radius: 8px;
        padding: 12px 14px;
      }

      .readme pre code {
        background: none;
        padding: 0;
      }

      .readme table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        font-size: 0.95rem;
      }

      .readme th,
      .readme td {
        border: 1px solid rgba(212, 175, 55, 0.22);
        padding: 8px 10px;
        text-align: left;
      }

      .readme th {
        color: var(--gold);
      }

      .readme ul,
      .readme ol {
        padding-left: 1.35rem;
      }
    </style>
  </head>
  <body>
    <header class="bar">
      <button type="button" class="refresh" id="refresh-btn">Refresh</button>
    </header>

    <main class="wrap">
      <p class="status" id="status">Loading README…</p>
      <article class="readme" id="readme"></article>
    </main>

    <script type="module">
      const README_RAW =
        "https://raw.githubusercontent.com/shifuguru/ps_and_as/main/README.md";
      const statusEl = document.getElementById("status");
      const readmeEl = document.getElementById("readme");
      const refreshBtn = document.getElementById("refresh-btn");

      function appBasePath() {
        const path = window.location.pathname;
        const idx = path.indexOf("/readme-fallback.html");
        if (idx > 0) return path.slice(0, idx);
        if (path.includes("/ps_and_as")) return "/ps_and_as";
        return "";
      }

      function hardRefresh() {
        const base = appBasePath();
        const url = new URL(base + "/" || "/", window.location.origin);
        url.searchParams.set("_", String(Date.now()));
        window.location.replace(url.toString());
      }

      refreshBtn.addEventListener("click", hardRefresh);

      async function loadMarked() {
        const mod = await import(
          "https://cdn.jsdelivr.net/npm/marked@15.0.7/lib/marked.esm.js"
        );
        return mod.marked;
      }

      async function fetchReadme() {
        const localUrl = "./README.md?_=" + Date.now();
        try {
          const local = await fetch(localUrl, { cache: "no-store" });
          if (local.ok) return local.text();
        } catch (_) {
          /* fall through to GitHub raw */
        }
        const remote = await fetch(README_RAW + "?_=" + Date.now(), {
          cache: "no-store",
        });
        if (!remote.ok) throw new Error("README fetch failed (" + remote.status + ")");
        return remote.text();
      }

      try {
        const [marked, markdown] = await Promise.all([loadMarked(), fetchReadme()]);
        readmeEl.innerHTML = marked.parse(markdown, { gfm: true, breaks: true });
        statusEl.textContent = "";
        statusEl.hidden = true;
      } catch (err) {
        statusEl.textContent =
          "Could not load README. Tap Refresh to retry the game, or open the repo on GitHub.";
        console.error("[readme-fallback]", err);
      }
    </script>
  </body>
</html>
