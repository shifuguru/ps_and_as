<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>P's &amp; A's</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
          Arial, sans-serif;
        background: #0f5132;
        color: rgba(255, 255, 255, 0.92);
      }
      .wrap {
        text-align: center;
        padding: 24px;
        max-width: 28rem;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.78);
      }
    </style>
    <script>
      (function () {
        var path = location.pathname || "";
        var base = path.indexOf("/ps_and_as") >= 0 ? "/ps_and_as" : "";
        var fallback = base + "/readme-fallback.html?_=" + Date.now();
        var appRoot = base + "/";

        function toReadme() {
          location.replace(fallback);
        }

        function toApp() {
          var qs = location.search || "";
          location.replace(appRoot + qs);
        }

        function fetchVersion(attempt) {
          return fetch(base + "/version.json?_=" + Date.now(), {
            cache: "no-store",
          }).then(function (res) {
            if (res.ok) return res;
            if (attempt >= 12) throw new Error("version unavailable");
            return new Promise(function (resolve) {
              setTimeout(resolve, 600 + attempt * 400);
            }).then(function () {
              return fetchVersion(attempt + 1);
            });
          });
        }

        fetchVersion(0)
          .then(function () {
            toApp();
          })
          .catch(toReadme);
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <h1>Loading P's &amp; A's…</h1>
      <p>Checking for the latest build. This usually takes a few seconds after a deploy.</p>
    </div>
  </body>
</html>
